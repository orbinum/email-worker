name: CI - Code Quality

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: email-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: email-worker

      - name: Lint
        run: npm run lint
        working-directory: email-worker

      - name: Format Check
        run: npm run format:check
        working-directory: email-worker

      - name: Type Check
        run: npm run type-check
        working-directory: email-worker

      - name: Run Tests
        run: npm test
        working-directory: email-worker
